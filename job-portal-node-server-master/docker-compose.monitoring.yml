# Docker Compose for Monitoring Stack
# Prometheus + Grafana + Jaeger
#
# Usage:
#   docker-compose -f docker-compose.monitoring.yml up -d

version: '3.8'

services:
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: job-portal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: job-portal-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # Jaeger - Distributed Tracing (optional)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: job-portal-jaeger
    ports:
      - "5775:5775/udp"   # Zipkin Thrift Compact
      - "6831:6831/udp"   # Jaeger Thrift Compact
      - "6832:6832/udp"   # Jaeger Thrift Binary
      - "5778:5778"       # Jaeger configs
      - "16686:16686"     # Jaeger UI
      - "14268:14268"     # Jaeger Collector
      - "14250:14250"     # gRPC
      - "9411:9411"       # Zipkin compatible
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter - System Metrics (optional)
  # node-exporter:
  #   image: prom/node-exporter:latest
  #   container_name: job-portal-node-exporter
  #   ports:
  #     - "9100:9100"
  #   command:
  #     - '--path.rootfs=/host'
  #   volumes:
  #     - '/:/host:ro,rslave'
  #   networks:
  #     - monitoring
  #   restart: unless-stopped

  # Redis Exporter - Redis Metrics (optional)
  # redis-exporter:
  #   image: oliver006/redis_exporter:latest
  #   container_name: job-portal-redis-exporter
  #   ports:
  #     - "9121:9121"
  #   environment:
  #     - REDIS_ADDR=host.docker.internal:6379
  #   networks:
  #     - monitoring
  #   restart: unless-stopped

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  monitoring:
    driver: bridge


<div *ngIf="password" class="mt-2 space-y-2">
  <!-- Strength Bar -->
  <div class="flex gap-1">
    <div
      *ngFor="let segment of [1, 2, 3, 4]"
      class="h-1.5 flex-1 rounded-full transition-all duration-300"
      [ngClass]="segment <= strength.score ? getStrengthColor() : 'bg-slate-200'"
    ></div>
  </div>

  <!-- Strength Label & Feedback -->
  <div class="flex items-center justify-between">
    <span *ngIf="strength.label" [ngClass]="getStrengthTextColor()" class="text-xs font-medium">
      {{ strength.label }}
    </span>
    <span *ngIf="!strength.label" class="text-xs text-slate-500">
      Enter a password
    </span>
  </div>

  <!-- Feedback Messages -->
  <div *ngIf="strength.feedback.length > 0" class="space-y-1">
    <p *ngFor="let tip of strength.feedback" class="text-xs text-slate-600 flex items-center space-x-1">
      <svg class="w-3 h-3 text-slate-400" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
      </svg>
      <span>{{ tip }}</span>
    </p>
  </div>

  <!-- Passphrase Suggestion -->
  <div *ngIf="strength.score < 3" class="mt-2 p-2 bg-slate-50 rounded-lg border border-slate-200">
    <p class="text-xs text-slate-600">
      <strong class="text-slate-800">Tip:</strong> Use a passphrase like "Coffee+Code=Happier!" — easier to remember and more secure.
    </p>
  </div>
</div>

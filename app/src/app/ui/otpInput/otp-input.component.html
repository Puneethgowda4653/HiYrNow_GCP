<div #otpContainer class="flex items-center justify-center gap-2 sm:gap-3">
  <input
    *ngFor="let value of otpValues; let i = index"
    type="text"
    inputmode="numeric"
    pattern="[0-9]*"
    maxlength="1"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event, i)"
    (keydown)="onKeyDown($event, i)"
    (paste)="onPaste($event)"
    class="w-12 h-12 sm:w-14 sm:h-14 text-center text-xl sm:text-2xl font-semibold bg-white border-2 border-slate-200 rounded-xl focus:border-primary focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:outline-none transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
    [attr.aria-label]="'OTP digit ' + (i + 1)"
  />
</div>

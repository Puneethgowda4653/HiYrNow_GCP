<button
  type="button"
  (click)="onSelect()"
  class="group relative w-full p-6 sm:p-8 bg-white/80 backdrop-blur-sm rounded-2xl sm:rounded-3xl border-2 border-slate-200 hover:border-primary transition-all duration-300 shadow-soft hover:shadow-glass transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
  [attr.aria-label]="'Continue as ' + title"
>
  <!-- Icon -->
  <div class="flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 mb-4 rounded-2xl bg-gradient-to-br from-primary to-accent text-white shadow-lg group-hover:shadow-xl transition-shadow duration-300">
    <svg *ngIf="!icon" class="w-8 h-8 sm:w-10 sm:h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path *ngIf="role === 'jobseeker'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
      <path *ngIf="role === 'recruiter'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
    </svg>
    <span *ngIf="icon" class="text-3xl">{{ icon }}</span>
  </div>

  <!-- Title -->
  <h3 class="text-xl sm:text-2xl font-bold text-slate-800 mb-2 group-hover:text-primary transition-colors duration-300">
    {{ title }}
  </h3>

  <!-- Description -->
  <p class="text-sm sm:text-base text-slate-600 mb-4 leading-relaxed">
    {{ description }}
  </p>

  <!-- Benefits -->
  <ul class="space-y-2 mb-6">
    <li *ngFor="let benefit of benefits" class="flex items-start space-x-2 text-sm text-slate-600">
      <svg class="w-5 h-5 text-primary flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
      </svg>
      <span>{{ benefit }}</span>
    </li>
  </ul>

  <!-- CTA -->
  <div class="flex items-center justify-between text-primary font-semibold group-hover:gap-2 transition-all duration-300">
    <span>Continue as {{ title }}</span>
    <svg class="w-5 h-5 transform group-hover:translate-x-1 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
    </svg>
  </div>
</button>

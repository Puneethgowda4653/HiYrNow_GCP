<div class="p-4">
  <div class="flex flex-wrap items-end gap-2 mb-4">
    <input class="border border-border rounded-2xl px-3 py-2 bg-surface" placeholder="Email" [(ngModel)]="filters.email" />
    <select class="border border-border rounded-2xl px-3 py-2 bg-surface" [(ngModel)]="filters.role">
      <option value="">All Roles</option>
      <option>Recruiter</option>
      <option>JobSeeker</option>
      <option>Admin</option>
    </select>
    <select class="border border-border rounded-2xl px-3 py-2 bg-surface" [(ngModel)]="filters.status">
      <option value="">Any Status</option>
      <option>active</option>
      <option>suspended</option>
    </select>
    <app-ui-button variant="primary" (click)="load()">Filter</app-ui-button>
  </div>

  <div *ngIf="loading" class="text-gray-500">Loading...</div>
  <div *ngIf="!loading">
    <app-ui-table>
      <thead class="bg-surface-muted sticky top-0">
          <tr>
            <th class="text-left p-3 text-text-muted font-semibold">Name</th>
            <th class="text-left p-3 text-text-muted font-semibold">Email</th>
            <th class="text-left p-3 text-text-muted font-semibold">Role</th>
            <th class="text-left p-3 text-text-muted font-semibold">Status</th>
            <th class="text-left p-3 text-text-muted font-semibold">Actions</th>
          </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users" class="border-t odd:bg-surface even:bg-surface-muted hover:bg-brand-mid/5 transition-colors">
          <td class="p-3">{{u.firstName || u.username}} {{u.lastName}}</td>
          <td class="p-3">{{u.email}}</td>
          <td class="p-3">
            <app-ui-badge [text]="u.role" variant="brand"></app-ui-badge>
          </td>
          <td class="p-3">
            <app-ui-badge [text]="u.status || 'active'" [variant]="(u.status || 'active')==='active' ? 'success' : 'warning'"></app-ui-badge>
          </td>
          <td class="p-3 space-x-2">
            <app-ui-button size="sm" variant="primary" (click)="setStatus(u,'active')">Activate</app-ui-button>
            <app-ui-button size="sm" variant="secondary" (click)="setStatus(u,'suspended')">Suspend</app-ui-button>
          </td>
        </tr>
      </tbody>
    </app-ui-table>
    <div class="mt-3 flex items-center gap-2">
      <button class="px-3 py-1 border rounded-2xl" [disabled]="page===1" (click)="page = page-1; load()">Prev</button>
      <div>Page {{page}}</div>
      <button class="px-3 py-1 border rounded-2xl" [disabled]="(page*pageSize)>=total" (click)="page = page+1; load()">Next</button>
    </div>
  </div>
</div>

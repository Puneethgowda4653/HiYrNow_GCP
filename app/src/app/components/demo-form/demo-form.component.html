<!-- demo-form.component.html -->
<div
  class="bg-gradient-to-r mt-16 from-blue-50 to-purple-50 flex items-center justify-center p-6"
>
  <div
    class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-5 gap-6 items-center mb-8 mt-8"
  >
    <!-- Left content section -->
    <div class="md:col-span-2 p-6">
      <div class="flex items-center">
        <div
          class="w-16 h-16 bg-indigo-500 rounded-full flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
            />
          </svg>
        </div>
      </div>

      <h1 class="text-5xl font-bold mb-4 text-gray-900">Book a demo</h1>
      <p class="text-lg text-gray-700">
        Experience smarter, faster hiring with HiYrNow’s AI-powered platform —
        book your free demo today and revolutionize your recruitment!
      </p>
    </div>

    <!-- Form section -->
    <div class="md:col-span-3 bg-white rounded-lg shadow-md p-6">
      <form
        [formGroup]="demoForm"
        (ngSubmit)="onSubmit()"
        class="grid grid-cols-1 md:grid-cols-2 gap-4"
      >
        <!-- First name -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              />
            </svg>
            <input
              type="text"
              formControlName="firstName"
              placeholder="First name"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Last name -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              />
            </svg>
            <input
              type="text"
              formControlName="lastName"
              placeholder="Last name"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Mobile phone number -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
              />
            </svg>
            <input
              type="tel"
              formControlName="phoneNumber"
              placeholder="Mobile phone number"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Number of agents -->

        <!-- Preferred Date & Time -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10m-11 4h12a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2z"
              />
            </svg>
            <input
              type="datetime-local"
              formControlName="preferredDateTime"
              placeholder="Preferred Date & Time"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Company name -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
              />
            </svg>
            <input
              type="text"
              formControlName="companyName"
              placeholder="Company name"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Company email -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              />
            </svg>
            <input
              type="email"
              formControlName="companyEmail"
              placeholder="Company email"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- Role -->
        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              />
            </svg>
            <input
              type="text"
              formControlName="role"
              placeholder="Role (optional)"
              class="w-full bg-transparent focus:outline-none"
            />
          </div>
        </div>

        <!-- How did you hear about us -->

        <div class="relative bg-gray-50 rounded-lg p-3">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-indigo-700 mr-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <select
              formControlName="hearAboutUs"
              class="w-full bg-transparent focus:outline-none appearance-none"
            >
              <option value="" disabled selected>
                How did you hear about us?
              </option>
              <option value="Google">Google</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="Facebook">Facebook</option>
              <option value="Instagram">Instagram</option>
              <option value="Referral">Referral</option>
              <option value="Other">Other</option>
            </select>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 text-gray-500 ml-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </div>
        </div>

        <!-- Submit button -->
        <div class="md:col-span-2 mt-2">
          <button
            type="submit"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white rounded-full py-3 px-6 flex justify-between items-center transition duration-300"
          >
            <span class="ml-auto">Submit</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 ml-auto"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              />
            </svg>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

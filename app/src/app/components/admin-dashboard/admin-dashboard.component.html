<div class="admin-dashboard">
  <h2>All Job Postings</h2>

  <!-- Filter Section -->
  <div class="filters">
    <input
      type="text"
      placeholder="Filter by Title"
      [(ngModel)]="filterTitle"
    />
    <input
      type="text"
      placeholder="Filter by Company"
      [(ngModel)]="filterCompany"
    />
    <input
      type="text"
      placeholder="Filter by Location"
      [(ngModel)]="filterLocation"
    />
    <label>
      <input type="checkbox" [(ngModel)]="includeActiveOnly" /> Include only
      active jobs
    </label>
  </div>

  <div class="count">Showing {{ filteredAndSortedJobs().length }} job(s)</div>

  <table>
    <thead>
      <tr>
        <th (click)="sortBy('title')">Title</th>
        <th (click)="sortBy('company')">Company</th>
        <th (click)="sortBy('location')">Location</th>
        <th (click)="sortBy('datePosted')">Posted Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let job of filteredAndSortedJobs()">
        <td>{{ job.title }}</td>
        <td>{{ job.company }}</td>
        <td>{{ job.location }}</td>
        <td>{{ job.datePosted }}</td>
        <td>
          <button [routerLink]="['/job/manage', job._id]">
            Manage Job Posting
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

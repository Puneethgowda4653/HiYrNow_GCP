<div class="min-h-screen bg-gradient-to-br from-surface-muted via-surface-subtlePurple to-white relative overflow-hidden">
  <!-- Background decorative elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-accent/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 flex items-center justify-center min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="w-full max-w-6xl">
      <!-- Header -->
      <div class="text-center mb-8 sm:mb-12">
        <div class="flex items-center justify-center mb-6">
          <div class="w-16 h-16 sm:w-20 sm:h-20 bg-white rounded-2xl flex items-center justify-center shadow-glass">
            <img
              src="../../../assets/hash.png"
              alt="HiYrNow logo"
              class="w-10 h-10 sm:w-12 sm:h-12"
            />
          </div>
        </div>
        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-slate-800 mb-3">
          Welcome to HiYrNow
        </h1>
        <p class="text-lg sm:text-xl text-slate-600 max-w-2xl mx-auto">
          Find jobs or hire top talent — start free
        </p>
      </div>

      <!-- Role Selection Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 mb-8">
        <!-- Jobseeker Card -->
        <app-role-card
          role="jobseeker"
          title="Jobseeker"
          description="Find your dream job with AI-powered matching"
          [benefits]="[
            'Access to 50+ countries job opportunities',
            'AI-driven job recommendations',
            'Free profile creation & applications',
            'Career growth resources & insights'
          ]"
          (selected)="onRoleSelected($event)"
        ></app-role-card>

        <!-- Recruiter Card -->
        <app-role-card
          role="recruiter"
          title="Recruiter"
          description="Hire top talent faster with smart matching"
          [benefits]="[
            'Access to verified talent pool',
            'AI-powered candidate matching',
            'Streamlined hiring workflow',
            'Enterprise SSO & team collaboration'
          ]"
          (selected)="onRoleSelected($event)"
        ></app-role-card>
      </div>

      <!-- Trust Signals -->
      <div class="text-center space-y-4">
        <div class="flex flex-wrap items-center justify-center gap-6 sm:gap-8 text-sm text-slate-600">
          <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-primary" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span>Secure & Privacy-First</span>
          </div>
          <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-primary" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
              <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
            </svg>
            <span>1.2M+ Active Users</span>
          </div>
          <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-primary" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span>Trusted by 800+ Companies</span>
          </div>
        </div>

        <!-- Already have account link -->
        <div class="pt-4 border-t border-slate-200">
          <p class="text-sm text-slate-600">
            Already have an account?
            <a routerLink="/login" class="font-semibold text-primary hover:text-primary-hover transition-colors ml-1">
              Sign in
            </a>
          </p>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-8 sm:mt-12 text-xs sm:text-sm text-slate-500">
        <p>
          By continuing, you agree to our
          <a routerLink="/terms" class="text-primary hover:underline">Terms of Service</a>
          and
          <a routerLink="/privacy" class="text-primary hover:underline">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>
</div>

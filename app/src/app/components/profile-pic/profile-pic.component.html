<div
  class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-2 sm:p-4 animate-fadeIn"
  (click)="closeProfilePicModal()"
>
  <div
    class="bg-white rounded-lg sm:rounded-xl p-4 sm:p-6 max-w-sm w-full shadow-2xl transform transition-all duration-300 scale-100 animate-slideUp"
    (click)="$event.stopPropagation()"
  >
    <div class="text-center mb-6">
      <div
        class="w-12 h-12 bg-blue-100 rounded-xl mx-auto mb-3 flex items-center justify-center"
      >
        <i class="fas fa-camera text-blue-600 text-lg"></i>
      </div>
      <h2 class="text-lg font-bold text-gray-900 mb-1">
        {{ profilePicExist ? "Update" : "Upload" }} Profile Picture
      </h2>
      <p class="text-gray-600 text-sm">
        Choose how you'd like to add your photo
      </p>
    </div>

    <div class="space-y-3">
      <!-- File Upload Button -->
      <label
        for="file-upload"
        class="block w-full cursor-pointer bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition-all duration-300 text-center font-semibold text-sm shadow-lg hover:shadow-xl"
      >
        <i class="fas fa-upload mr-2"></i>
        Choose from Device
      </label>
      <input
        id="file-upload"
        type="file"
        (change)="onProfilePicSelected($event)"
        class="hidden"
        accept="image/*"
      />

      <!-- Google Drive Button -->
      <button
        class="w-full bg-red-600 text-white px-4 py-3 rounded-lg hover:bg-red-700 transition-all duration-300 font-semibold text-sm shadow-lg hover:shadow-xl"
      >
        <i class="fab fa-google-drive mr-2"></i>
        Select from Google Drive
      </button>

      <!-- Drag & Drop Area -->
      <ngx-file-drop (onFileDrop)="droppedProfilePic($event)" class="mt-4">
        <ng-template ngx-file-drop-content-tmp>
          <div
            class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center transition-all duration-300 hover:border-blue-500 hover:bg-blue-50"
          >
            <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
            <p class="text-gray-600 font-medium mb-1 text-sm">
              Drag & Drop your image here
            </p>
            <p class="text-xs text-gray-500">
              Supports JPG, PNG, GIF up to 5MB
            </p>
          </div>
        </ng-template>
      </ngx-file-drop>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 mt-6">
      <button
        (click)="closeProfilePicModal()"
        class="flex-1 px-4 py-2 text-gray-600 hover:text-gray-800 font-medium transition-colors duration-200 text-sm"
      >
        Cancel
      </button>
      <button
        class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all duration-300 font-semibold text-sm shadow-lg hover:shadow-xl"
      >
        Upload Photo
      </button>
    </div>
  </div>
</div>

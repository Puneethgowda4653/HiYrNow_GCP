<!-- 🎨 MATCHED PROFILE VIEW - Premium HiYrNow Design -->
<div class="min-h-screen bg-gradient-to-br from-[#F7F7FD] via-white to-[#EDEBFF]">
  <!-- Sticky Header -->
  <header
    class="sticky top-0 z-50 backdrop-blur-xl bg-white/90 shadow-[0_4px_20px_rgba(0,0,0,0.06)] border-b border-gray-100/50 py-4 px-4 sm:px-6 lg:px-8"
    [@fadeInDown]
  >
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <!-- Back and Title -->
      <div class="flex items-center gap-4">
        <a
          [routerLink]="['/job/manage', jobId]"
          class="inline-flex items-center px-4 py-2 bg-white border-2 border-gray-200 text-gray-700 rounded-xl font-semibold text-sm hover:border-[#6254E5] hover:text-[#6254E5] hover:bg-[#6254E5]/5 transition-all duration-300 hover:shadow-sm"
        >
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
          </svg>
          Back
        </a>
        <div>
          <h1 class="text-xl sm:text-2xl font-bold  bg-gradient-to-br from-primary to-accent bg-clip-text text-transparent">
            {{ jobDetails?.title || "Matched Profile" }}
          </h1>
          <p class="text-sm text-gray-600 mt-0.5">
            Candidate Profile Review
          </p>
        </div>
      </div>
      <!-- Profile Status -->
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-600 font-medium">Type:</span>
        <span
          class="px-4 py-2 text-sm font-semibold rounded-xl border bg-green-50 text-green-700 border-green-200 transition-all duration-300"
        >
          Matched Candidate
        </span>
      </div>
    </div>
  </header>

  <!-- Loading Skeleton -->
  <div *ngIf="loading" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="animate-pulse space-y-6">
      <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-6 border border-gray-100">
        <div class="h-8 bg-gray-100 rounded-xl w-1/3 mb-4"></div>
        <div class="h-4 bg-gray-100 rounded-lg w-1/2 mb-2"></div>
        <div class="h-4 bg-gray-100 rounded-lg w-1/4"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-6 border border-gray-100">
        <div class="flex items-center mb-6">
          <div class="rounded-full bg-gray-100 h-20 w-20"></div>
          <div class="ml-4 space-y-2 flex-1">
            <div class="h-6 bg-gray-100 rounded-lg w-48"></div>
            <div class="h-4 bg-gray-100 rounded-lg w-36"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="!loading && error" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16" [@fadeInUp]>
    <div class="text-center bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-12 border border-gray-100">
      <div class="w-20 h-20 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Profile Not Found</h2>
      <p class="text-gray-600 mb-6">We couldn't load the profile details. Please try again later.</p>
      <button
        (click)="retry()"
        class="inline-flex items-center px-6 py-3  bg-gradient-to-br from-primary to-accent text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-[#6254E5]/30 transition-all duration-300 transform hover:scale-[1.02]"
      >
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          ></path>
        </svg>
        Retry
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div *ngIf="!loading && !error && userId" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6" [@fadeIn]>
    <!-- Top row: Quick Actions + Actions side-by-side -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <!-- Quick Actions Card -->
      <div
        class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-gray-100 p-6"
        [@fadeInUp]
      >
        <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg  bg-gradient-to-br from-primary to-accent flex items-center justify-center">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
          </div>
          Quick Actions
        </h3>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <!-- Download Profile -->
          <button
            (click)="downloadUserProfile()"
            class="group flex flex-col items-center justify-center p-4 bg-gradient-to-br from-[#EDEBFF] to-white border-2 border-[#EDEBFF] rounded-xl hover:border-[#6254E5] hover:shadow-md transition-all duration-300"
          >
            <div
              class="w-10 h-10 rounded-lg  bg-gradient-to-br from-primary to-accent flex items-center justify-center mb-2 group-hover:scale-110 transition-transform"
            >
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-semibold text-gray-700 group-hover:text-[#6254E5] transition-colors">Download Profile</span>
          </button>

          <!-- Download Resume -->
          <button
            *ngIf="resume && resume.length > 0"
            (click)="downloadResume(resume[0].filename, resume[0].contentType)"
            class="group flex flex-col items-center justify-center p-4 bg-gradient-to-br from-[#EDEBFF] to-white border-2 border-[#EDEBFF] rounded-xl hover:border-[#6254E5] hover:shadow-md transition-all duration-300"
          >
            <div
              class="w-10 h-10 rounded-lg  bg-gradient-to-br from-primary to-accent flex items-center justify-center mb-2 group-hover:scale-110 transition-transform"
            >
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-semibold text-gray-700 group-hover:text-[#6254E5] transition-colors">Download Resume</span>
          </button>

          <!-- AI Analysis -->
          <button
            (click)="openAIAnalysisModal()"
            class="group flex flex-col items-center justify-center p-4 bg-gradient-to-br from-[#EDEBFF] to-white border-2 border-[#EDEBFF] rounded-xl hover:border-[#6254E5] hover:shadow-md transition-all duration-300"
          >
            <div
              class="w-10 h-10 rounded-lg  bg-gradient-to-br from-primary to-accent flex items-center justify-center mb-2 group-hover:scale-110 transition-transform"
            >
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
                ></path>
              </svg>
            </div>
            <span class="text-xs font-semibold text-gray-700 group-hover:text-[#6254E5] transition-colors">AI Analysis</span>
          </button>
        </div>
      </div>

      <!-- Profile Actions -->
      <div
        class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-gray-100 p-6"
        [@slideInLeft]
      >
        <div class="flex items-center mb-6">
          <div
            class="w-10 h-10 rounded-xl  bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-lg"
          >
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
          </div>
          <h3 class="text-xl font-bold text-gray-900 ml-3">Profile Actions</h3>
        </div>

        <!-- 2 Buttons Per Row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <!-- Send Job Description -->
          <button
            (click)="sendJobDescription()"
            class="group relative w-full flex items-center justify-center px-4 py-3  bg-gradient-to-br from-primary to-accent text-white font-semibold rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:shadow-[#6254E5]/30 hover:scale-[1.02] active:scale-[0.98]"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"
            ></div>
            <div class="relative flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
              <span>Send Job Description</span>
            </div>
          </button>

          <!-- Contact Candidate -->
          <button
            (click)="contactCandidate()"
            class="group relative w-full flex items-center justify-center px-4 py-3 bg-gradient-to-r from-[#8B73FF] to-[#4D3CD3] text-white font-semibold rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:shadow-[#8B73FF]/30 hover:scale-[1.02] active:scale-[0.98]"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"
            ></div>
            <div class="relative flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
              <span>Contact</span>
            </div>
          </button>

          <!-- Share Profile -->
          <button
            (click)="shareProfile('linkedin')"
            class="group relative w-full flex items-center justify-center px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:shadow-blue-600/30 hover:scale-[1.02] active:scale-[0.98]"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"
            ></div>
            <div class="relative flex items-center gap-2">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                ></path>
              </svg>
              <span>Share on LinkedIn</span>
            </div>
          </button>

          <!-- Share on Twitter -->
          <button
            (click)="shareProfile('twitter')"
            class="group relative w-full flex items-center justify-center px-4 py-3 bg-gradient-to-r from-sky-500 to-sky-600 text-white font-semibold rounded-xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:shadow-sky-500/30 hover:scale-[1.02] active:scale-[0.98]"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"
            ></div>
            <div class="relative flex items-center gap-2">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"
                ></path>
              </svg>
              <span>Share on Twitter</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Candidate Profile View -->
    <div class="space-y-6">
      <div
        [@fadeInUp]
        class="bg-white/90 backdrop-blur-xl rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-gray-100 p-6 overflow-hidden"
      >
        <app-candidate-profile-view
          [userId]="userId"
          [jobId]="jobId || ''"
          [showActions]="false"
          [showBackButton]="false"
        ></app-candidate-profile-view>
      </div>
    </div>
  </div>

  <!-- AI Analysis Modal -->
  <app-ai-analysis-modal
    [isOpen]="isAIAnalysisModalOpen"
    [isAnalyzing]="isAnalyzing"
    [analysisResults]="aiAnalysisResults"
    (close)="closeAIAnalysisModal()"
  ></app-ai-analysis-modal>
</div>

<div
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
  *ngIf="candidates.length > 0"
>
  <div
    *ngFor="let candidate of candidates"
    class="bg-white/90 backdrop-blur-sm rounded-xl shadow-xl border border-gray-100/80 overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 group relative"
  >
    <div
      class="absolute inset-x-0 top-0 h-24 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"
    ></div>
    <div
      class="h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-violet-500 transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform duration-500"
    ></div>
    <div class="p-4 relative z-10">
      <div class="flex items-start justify-between mb-4">
        <div class="flex items-center space-x-4">
          <div class="relative">
            <div
              class="absolute -inset-1 bg-gradient-to-tr from-indigo-500 via-purple-400 to-pink-500 rounded-2xl opacity-0 group-hover:opacity-70 blur-md transition-opacity duration-500"
            ></div>
            <img
              [src]="getUserProfilePicUrl(candidate)"
              [alt]="candidate.userName.firstName + '\'s profile'"
              class="relative h-16 w-16 rounded-2xl object-cover border-2 border-white shadow-lg transition-all duration-300 group-hover:scale-105 group-hover:rotate-2 z-10"
              (error)="setDefaultProfilePic(candidate)"
            />
          </div>
          <div>
            <h3
              class="text-lg font-extrabold text-gray-900 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-indigo-600 group-hover:to-purple-600 transition-all duration-300"
            >
              {{
                candidate.userName.username ||
                  candidate.userName.firstName +
                    " " +
                    candidate.userName.lastName
              }}
            </h3>
            <p class="text-sm text-gray-500 flex items-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-3.5 w-3.5 mr-1.5 text-indigo-400"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"
                ></path>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
              </svg>
              {{ candidate.userName.tagline || "Candidate" }}
            </p>
          </div>
        </div>
      </div>
      <div class="mt-4">
        <h4
          class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3 flex items-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3.5 w-3.5 mr-1.5 text-indigo-400"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
          Top Skills
        </h4>
        <div class="flex flex-wrap gap-2">
          <span
            *ngFor="let skill of candidate.userName.skills?.slice(0, 5)"
            class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-indigo-50/70 text-indigo-700 border border-indigo-100/50 hover:bg-indigo-100 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-default"
          >
            {{ skill }}
          </span>
        </div>
      </div>
      <div class="mt-4 text-sm text-gray-600 flex items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 mr-1.5 text-indigo-400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
          ></path>
        </svg>
        Joined
        {{
          candidate.userName.joinDate
            ? (candidate.userName.joinDate | date : "MMM yyyy")
            : "Recently"
        }}
      </div>
    </div>
    <div
      class="px-4 py-3 border-t border-gray-100/80 flex justify-between items-center backdrop-blur-sm bg-gradient-to-r from-gray-50/90 to-indigo-50/60 group-hover:from-indigo-50/90 group-hover:to-purple-50/60 transition-all duration-500"
    >
      <button
        [routerLink]="['/Matched-Profile', candidate.userName._id, jobId]"
        class="inline-flex items-center px-4 py-1.5 rounded-xl text-sm font-medium text-indigo-600 hover:text-white bg-white hover:bg-indigo-600 shadow-sm hover:shadow-md transition-all duration-300 border border-indigo-100 group"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 mr-1.5 group-hover:scale-110 transition-transform duration-200"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
          ></path>
        </svg>
        View Profile
      </button>
    </div>
  </div>
</div>

<div class="bg-white rounded-card shadow-elev-md border border-gray-100 p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold text-text-primary">Profile Completion</h3>
    <span 
      class="text-2xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent"
      [attr.aria-label]="'Profile completion: ' + progressPercentage + ' percent'"
    >
      {{ progressPercentage }}%
    </span>
  </div>

  <!-- Progress Bar -->
  <div class="mb-6">
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div 
        class="h-full transition-all duration-500 ease-out rounded-full bg-gradient-to-r from-primary to-accent"
        [style.width.%]="progressPercentage"
        [attr.role]="'progressbar'"
        [attr.aria-valuenow]="progressPercentage"
        [attr.aria-valuemin]="0"
        [attr.aria-valuemax]="100"
        [attr.aria-label]="'Profile completion progress: ' + progressPercentage + ' percent'"
      ></div>
    </div>
  </div>

  <!-- Completion Stats -->
  <div class="space-y-3" *ngIf="completionScore && !isLoading">
    <div class="flex items-center justify-between text-sm">
      <span class="text-text-secondary">Sections Completed</span>
      <span class="font-semibold text-text-primary">
        {{ completionScore.sectionsCompleted }} / {{ completionScore.totalSections }}
      </span>
    </div>

    <!-- Remaining Sections -->
    <div *ngIf="remainingSections.length > 0" class="mt-4">
      <p class="text-sm font-medium text-text-secondary mb-2">Remaining Sections:</p>
      <ul class="space-y-1">
        <li 
          *ngFor="let section of remainingSections" 
          class="text-sm text-text-muted flex items-center gap-2"
        >
          <i class="fas fa-circle text-xs text-warning"></i>
          <span>{{ section }}</span>
        </li>
      </ul>
    </div>

    <!-- Complete Message -->
    <div 
      *ngIf="remainingSections.length === 0 && completionScore.score === 100"
      class="mt-4 p-3 bg-success/10 rounded-card border border-success/20"
    >
      <p class="text-sm font-medium text-success flex items-center gap-2">
        <i class="fas fa-check-circle"></i>
        Profile Complete! Ready to publish.
      </p>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="animate-pulse space-y-3">
    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
    <div class="h-4 bg-gray-200 rounded w-1/2"></div>
  </div>

  <!-- Quick Actions (for current user) -->
  <div *ngIf="isCurrentUser && completionScore" class="mt-6 pt-6 border-t border-gray-100">
    <button 
      class="w-full px-4 py-2 bg-gradient-to-r from-primary to-accent text-white rounded-card font-medium hover:shadow-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
      (click)="loadCompletionScore()"
      [attr.aria-label]="'Refresh profile completion score'"
    >
      <i class="fas fa-sync-alt mr-2"></i>
      Refresh Status
    </button>
  </div>
</div>

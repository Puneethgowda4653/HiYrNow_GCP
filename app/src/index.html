  <!-- Loader Styles -->
  <style>
    .loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loader-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-container {
      width: 150px;
      height: 150px;
      position: relative;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .spinner {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div class="loader-container" id="loader">
    <div class="logo-container">
      <img src="assets/hiyrnow_logo.png" alt="Hiyrnow Logo" class="logo" />
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Loader Script -->
  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        const loader = document.getElementById("loader");
        loader.classList.add("loader-hidden");

        loader.addEventListener("transitionend", function () {
          document.body.removeChild(loader);
        });
      }, 1000);
    });
  </script>

  <!-- Angular App Root -->
  <app-root></app-root>
</body>
